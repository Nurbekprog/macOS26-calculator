<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0c12" />
    <title>macOS Calculator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="calculator-window" aria-label="macOS style calculator">
        <header class="window-chrome">
          <div class="traffic-lights" aria-hidden="true">
            <span class="traffic-light close"></span>
            <span class="traffic-light minimize"></span>
            <span class="traffic-light maximize"></span>
          </div>

          <div class="chrome-pill" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
              <rect x="3.5" y="4" width="17" height="16" rx="3"></rect>
              <line x1="9" y1="4" x2="9" y2="20"></line>
              <line x1="6" y1="8" x2="6" y2="8"></line>
              <line x1="6" y1="12" x2="6" y2="12"></line>
            </svg>
          </div>

          <div class="chrome-pill chrome-pill-right" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
              <rect x="4.5" y="3.5" width="15" height="17" rx="3"></rect>
              <line x1="8" y1="8" x2="16" y2="8"></line>
              <line x1="8" y1="12" x2="8" y2="12"></line>
              <line x1="12" y1="12" x2="12" y2="12"></line>
              <line x1="16" y1="12" x2="16" y2="12"></line>
              <line x1="8" y1="16" x2="8" y2="16"></line>
              <line x1="12" y1="16" x2="12" y2="16"></line>
              <line x1="16" y1="16" x2="16" y2="16"></line>
            </svg>
          </div>
        </header>

        <div class="display-panel">
          <p class="expression" id="expression"></p>
          <output class="display" id="display" aria-live="polite">0</output>
        </div>

        <div class="button-grid" aria-label="Calculator buttons">
          <button
            type="button"
            class="calc-btn function"
            data-action="backspace"
            aria-label="Delete"
          >
            <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
              <path
                d="M10 6H19a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H10L3.5 12 10 6Z"
              ></path>
              <line x1="11" y1="9" x2="17" y2="15"></line>
              <line x1="17" y1="9" x2="11" y2="15"></line>
            </svg>
          </button>
          <button type="button" class="calc-btn function" data-action="clear">
            AC
          </button>
          <button type="button" class="calc-btn function" data-action="percent">
            %
          </button>
          <button
            type="button"
            class="calc-btn operator"
            data-action="operator"
            data-value="/"
          >
            ÷
          </button>

          <button
            type="button"
            class="calc-btn digit"
            data-action="digit"
            data-value="7"
          >
            7
          </button>
          <button
            type="button"
            class="calc-btn digit"
            data-action="digit"
            data-value="8"
          >
            8
          </button>
          <button
            type="button"
            class="calc-btn digit"
            data-action="digit"
            data-value="9"
          >
            9
          </button>
          <button
            type="button"
            class="calc-btn operator"
            data-action="operator"
            data-value="*"
          >
            ×
          </button>

          <button
            type="button"
            class="calc-btn digit"
            data-action="digit"
            data-value="4"
          >
            4
          </button>
          <button
            type="button"
            class="calc-btn digit"
            data-action="digit"
            data-value="5"
          >
            5
          </button>
          <button
            type="button"
            class="calc-btn digit"
            data-action="digit"
            data-value="6"
          >
            6
          </button>
          <button
            type="button"
            class="calc-btn operator"
            data-action="operator"
            data-value="-"
          >
            −
          </button>

          <button
            type="button"
            class="calc-btn digit"
            data-action="digit"
            data-value="1"
          >
            1
          </button>
          <button
            type="button"
            class="calc-btn digit"
            data-action="digit"
            data-value="2"
          >
            2
          </button>
          <button
            type="button"
            class="calc-btn digit"
            data-action="digit"
            data-value="3"
          >
            3
          </button>
          <button
            type="button"
            class="calc-btn operator"
            data-action="operator"
            data-value="+"
          >
            +
          </button>

          <button type="button" class="calc-btn digit" data-action="sign">
            +/−
          </button>
          <button
            type="button"
            class="calc-btn digit"
            data-action="digit"
            data-value="0"
          >
            0
          </button>
          <button type="button" class="calc-btn digit" data-action="decimal">
            ,
          </button>
          <button type="button" class="calc-btn operator" data-action="equals">
            =
          </button>
        </div>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
